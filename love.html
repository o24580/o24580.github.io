
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>表白邀请</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial Rounded MT Bold', 'Arial', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 30px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            max-width: 500px;
            width: 90%;
            transition: all 0.5s ease;
        }

        .character {
            width: 120px;
            height: 150px;
            margin: 0 auto 20px;
            position: relative;
        }

        .person {
            width: 80px;
            height: 120px;
            background: #4a90e2;
            border-radius: 40px 40px 10px 10px;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }

        .head {
            width: 60px;
            height: 60px;
            background: #ffdbac;
            border-radius: 50%;
            position: absolute;
            top: -40px;
            left: 50%;
            transform: translateX(-50%);
        }

        .heart {
            position: absolute;
            top: -90px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 40px;
            color: #ff4757;
            animation: heartbeat 1.5s ease-in-out infinite;
        }

        .question {
            font-size: 24px;
            color: #333;
            margin-bottom: 30px;
            font-weight: bold;
        }

        .buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }

        .btn {
            padding: 15px 30px;
            border: none;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .yes-btn {
            background: linear-gradient(45deg, #4CAF50, #8BC34A);
            color: white;
            transform: scale(1);
        }

        .no-btn {
            background: linear-gradient(45deg, #ff4757, #ff6b81);
            color: white;
        }

        .kiss-scene {
            display: none;
            text-align: center;
        }

        .couple {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
        }

        .person1, .person2 {
            width: 100px;
            height: 150px;
            position: relative;
        }

        .person1 .body, .person2 .body {
            width: 70px;
            height: 100px;
            background: #4a90e2;
            border-radius: 35px 35px 10px 10px;
            position: absolute;
            bottom: 0;
        }

        .person1 .head, .person2 .head {
            width: 50px;
            height: 50px;
            background: #ffdbac;
            border-radius: 50%;
            position: absolute;
            bottom: 90px;
        }

        .person1 {
            transform: translateX(20px);
        }

        .person2 {
            transform: translateX(-20px);
        }

        .hearts {
            position: absolute;
            top: -40px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 30px;
            color: #ff4757;
            animation: float 2s ease-in-out infinite;
        }

        .message {
            font-size: 28px;
            color: #e84393;
            font-weight: bold;
            margin-top: 20px;
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes heartbeat {
            0%, 100% { transform: translateX(-50%) scale(1); }
            50% { transform: translateX(-50%) scale(1.1); }
        }

        @keyframes float {
            0%, 100% { transform: translateX(-50%) translateY(0px); }
            50% { transform: translateX(-50%) translateY(-10px); }
        }

        @keyframes glow {
            from { text-shadow: 0 0 10px #fff, 0 0 20px #fff, 0 0 30px #e60073; }
            to { text-shadow: 0 0 20px #fff, 0 0 30px #ff4da6, 0 0 40px #ff4da6; }
        }
    </style>
</head>
<body>
    <div class="container" id="proposalScene">
        <div class="character">
            <div class="heart">❤️</div>
            <div class="head"></div>
            <div class="person"></div>
        </div>
        <h1 class="question">可以成为我的恋人吗？</h1>
        <div class="buttons">
            <button class="btn yes-btn" id="yesBtn">可以</button>
            <button class="btn no-btn" id="noBtn">不要</button>
        </div>
    </div>

    <div class="container kiss-scene" id="kissScene">
        <div class="couple">
            <div class="person1">
                <div class="head"></div>
                <div class="body"></div>
            </div>
            <div class="person2">
                <div class="head"></div>
                <div class="body"></div>
            </div>
            <div class="hearts">❤️❤️❤️</div>
        </div>
        <h2 class="message">我们在一起啦！</h2>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const yesBtn = document.getElementById('yesBtn');
            const noBtn = document.getElementById('noBtn');
            const proposalScene = document.getElementById('proposalScene');
            const kissScene = document.getElementById('kissScene');
            
            const noTexts = ['不要', '你认真的吗？', '要不要再考虑一下？'];
            let clickCount = 0;
            
            noBtn.addEventListener('click', function() {
                clickCount++;
                
                // 更新右边按钮文本
                if (clickCount < noTexts.length) {
                    noBtn.textContent = noTexts[clickCount];
                }
                
                // 左边按钮变大
                const currentScale = parseFloat(getComputedStyle(yesBtn).transform.split(',')[3]) || 1;
                yesBtn.style.transform = `scale(${currentScale + 0.2})`;
                
                // 右边按钮变小
                const currentNoScale = parseFloat(getComputedStyle(noBtn).transform.split(',')[3]) || 1;
                noBtn.style.transform = `scale(${currentNoScale - 0.2})`;
                
                // 点击3次后右边按钮消失
                if (clickCount >= 3) {
                    noBtn.style.display = 'none';
                }
            });
            
            yesBtn.addEventListener('click', function() {
                // 切换到热吻画面
                proposalScene.style.display = 'none';
                kissScene.style.display = 'block';
                
                // 添加庆祝效果
                setTimeout(() => {
                    const hearts = document.createElement('div');
                    hearts.className = 'hearts';
                    hearts.textContent = '💖💖💖';
                    hearts.style.position = 'fixed';
                    hearts.style.top = '0';
                    hearts.style.left = '0';
                    hearts.style.width = '100%';
                    hearts.style.height = '100%';
                    hearts.style.fontSize = '30px';
                    hearts.style.display = 'flex';
                    hearts.style.justifyContent = 'center';
                    hearts.style.alignItems = 'center';
                    hearts.style.pointerEvents = 'none';
                    hearts.style.zIndex = '1000';
                    hearts.style.animation = 'float 1.5s ease-in-out infinite';
                    document.body.appendChild(hearts);
                }, 500);
            });
        });
    </script>
</body>
</html>
